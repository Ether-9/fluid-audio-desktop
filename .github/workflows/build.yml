name: Build Multi-Platform App

on:
  push:
    tags:
      - 'v*'  # Triggers when you push tags like v1.0.0
  workflow_dispatch:  # Allows manual triggering from Actions tab

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            ext: .exe
          - os: macos-latest
            ext: .dmg
          - os: ubuntu-latest
            ext: .AppImage

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          # For Windows .exe
          pyinstaller --onefile --name "FluidAudio-${{ matrix.os }}" main.py
          
          # If you have .pyd files, copy them to the dist folder
          # Copy any .pyd files from your source to dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FluidAudio-${{ matrix.os }}
          path: dist/FluidAudio-${{ matrix.os }}${{ matrix.ext }}

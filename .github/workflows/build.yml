name: Build Fluid Audio for All Platforms

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies (Windows)
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          choco install qt6 -y
      
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Compile C++ to .pyd
        run: |
          python setup.py build_ext --inplace
      
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name "FluidAudio" --icon "icon.ico" --add-data "native_audio.pyd;." --hidden-import "PySide6" --hidden-import "PySide6.QtCore" --hidden-import "PySide6.QtGui" --hidden-import "PySide6.QtWidgets" main.py
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FluidAudio-Windows
          path: dist/FluidAudio.exe

  build-macos:
    name: Build on macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies (macOS)
        run: |
          brew install cmake
          brew install qt6
          brew install rubberband
          brew install libsndfile
      
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Compile C++ to .so
        run: |
          python setup.py build_ext --inplace
      
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name "FluidAudio" --icon "icon.ico" --add-data "native_audio.so;." --hidden-import "PySide6" --hidden-import "PySide6.QtCore" --hidden-import "PySide6.QtGui" --hidden-import "PySide6.QtWidgets" main.py
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FluidAudio-macOS
          path: dist/FluidAudio

  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            qt6-base-dev \
            qt6-base-dev-tools \
            libqt6core5compat6-dev \
            librubberband-dev \
            libsndfile1-dev \
            libssl-dev \
            python3-pyqt6
      
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Compile C++ to .so
        run: |
          python setup.py build_ext --inplace
      
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name "FluidAudio" --icon "icon.ico" --add-data "native_audio.so;." --hidden-import "PySide6" --hidden-import "PySide6.QtCore" --hidden-import "PySide6.QtGui" --hidden-import "PySide6.QtWidgets" main.py
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FluidAudio-Linux
          path: dist/FluidAudio

name: Build Fluid Audio for All Platforms

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name "FluidAudio" --icon "icon.ico" main.py
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FluidAudio-Windows
          path: dist/FluidAudio.exe

  build-macos:
    name: Build on macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          brew install cmake
          brew install qt6
          brew install rubberband
      
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
      
      - name: Build with CMake
        run: |
          cd build
          cmake --build . --config Release --parallel 2
      
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name "FluidAudio" --icon "icon.ico" main.py
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FluidAudio-macOS
          path: dist/FluidAudio

  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            qt6-base-dev \
            qt6-base-dev-tools \
            libqt6core5compat6-dev \
            librubberband-dev \
            libssl-dev \
            python3-pyqt6
      
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
      
      - name: Build with CMake
        run: |
          cd build
          cmake --build . --config Release --parallel 2
      
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name "FluidAudio" --icon "icon.ico" main.py
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FluidAudio-Linux
          path: dist/FluidAudio

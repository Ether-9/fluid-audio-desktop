name: Build Fluid Audio for All Platforms

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            ext: .AppImage
            qt_packages: qt6-base-dev qt6-base-dev-tools qt6-tools-dev libqt6core5compat6-dev
            extra_packages: librubberband-dev
          - os: windows-latest
            ext: .exe
            qt_packages: ""
            extra_packages: ""
          - os: macos-latest
            ext: .dmg
            qt_packages: ""
            extra_packages: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Ubuntu dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            qt6-base-dev \
            qt6-base-dev-tools \
            libqt6core5compat6-dev \
            librubberband-dev \
            libssl-dev

      - name: Install macOS dependencies
        if: matrix.os == 'macos-latest'
        run: |
          brew install cmake
          brew install qt6
          brew install rubberband
          brew install pkg-config

      - name: Install Windows dependencies
        if: matrix.os == 'windows-latest'
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          choco install qt6 -y

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release

      - name: Build with CMake
        run: |
          cd build
          cmake --build . --config Release --parallel 2

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile \
            --name "FluidAudio" \
            --icon "icon.ico" \
            --add-data "mainwindow.py:." \
            --add-data "audio_engine.py:." \
            --add-data "cards_ui.py:." \
            --add-data "fading_stack.py:." \
            --hidden-import "PySide6" \
            --hidden-import "PySide6.QtCore" \
            --hidden-import "PySide6.QtGui" \
            --hidden-import "PySide6.QtWidgets" \
            main.py

      - name: Rename output
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv dist/FluidAudio.exe dist/FluidAudio${{ matrix.ext }}
          else
            mv dist/FluidAudio dist/FluidAudio${{ matrix.ext }}
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FluidAudio-${{ matrix.os }}
          path: dist/FluidAudio${{ matrix.ext }}

name: Build Fluid Audio for All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Fluid Audio for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            ext: .exe
            icon: icon.ico
            python_ext: .pyd
          - os: macos-latest
            ext: .dmg
            icon: icon.ico
            python_ext: .so
          - os: ubuntu-latest
            ext: .AppImage
            icon: icon.ico
            python_ext: .so

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install build tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Install build tools (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install cmake

      - name: Install build tools (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'

      - name: Compile C++ extensions with CMake
        run: |
          mkdir build
          cd build
          cmake ..
          cmake --build . --config Release

      - name: Copy compiled extensions
        run: |
          # Copy all compiled .pyd/.so files to root directory
          find build -name "*.pyd" -o -name "*.so" | xargs -I {} cp {} .

      - name: Build Fluid Audio with PyInstaller
        run: |
          pyinstaller --onefile \
            --name "FluidAudio" \
            --icon "${{ matrix.icon }}" \
            --add-data "mainwindow.py:." \
            --add-data "audio_engine.py:." \
            --add-data "cards_ui.py:." \
            --add-data "fading_stack.py:." \
            --add-data "*.pyd:." \
            --add-data "*.so:." \
            --hidden-import "PyQt5" \
            --hidden-import "PyQt5.QtCore" \
            --hidden-import "PyQt5.QtGui" \
            --hidden-import "PyQt5.QtWidgets" \
            mainwindow.py

      - name: Rename output for platform
        run: |
          mv dist/FluidAudio dist/FluidAudio-${{ matrix.os }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FluidAudio-${{ matrix.os }}
          path: dist/FluidAudio-${{ matrix.os }}${{ matrix.ext }}
